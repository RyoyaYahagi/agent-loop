name: PR CI Repair and Merge

on:
  workflow_dispatch:
    inputs:
      pr:
        description: "PR number to repair until CI is green, then merge"
        required: true
      repair_command:
        description: "One repair attempt command. Placeholders: {pr}, {attempt}"
        required: true
      max_attempts:
        description: "Maximum repair attempts before human handoff"
        required: false
        default: "3"
      allowed_base:
        description: "Base branch automation may merge into"
        required: false
        default: "develop"
      require_review_approval:
        description: "Require reviewDecision=APPROVED before merge"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write
  pull-requests: write
  actions: read
  checks: read
  statuses: read

jobs:
  repair-and-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agent-loop toolkit
        run: python -m pip install -e .

      - name: Repair until CI green, then merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXTRA_ARGS=()
          if [ "${{ inputs.require_review_approval }}" = "true" ]; then
            EXTRA_ARGS+=(--require-review-approval)
          fi
          python scripts/pr_ci_repair_merge.py "${{ inputs.pr }}" \
            --repair-command "${{ inputs.repair_command }}" \
            --max-attempts "${{ inputs.max_attempts }}" \
            --allowed-base "${{ inputs.allowed_base }}" \
            "${EXTRA_ARGS[@]}"
